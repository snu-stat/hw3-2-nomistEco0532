name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Miniforge / Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          activate-environment: r-reticulate
          python-version: "3.10"
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: "true"

      - name: Install Python dependencies
        run: |
          conda install -y \
            numpy pandas matplotlib scipy statsmodels seaborn polars \
            requests beautifulsoup4 session-info

          python -c "import numpy, pandas, matplotlib, scipy, statsmodels, seaborn, polars, requests, bs4, session_info; print('Python packages OK')"

      - name: Point reticulate to Conda Python
        run: |
          echo "RETICULATE_PYTHON=$CONDA_PREFIX/bin/python" >> "$GITHUB_ENV"
          echo "Using Python: $CONDA_PREFIX/bin/python"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::reticulate
            any::knitr
            any::rmarkdown
            any::tidyverse
            any::mdsr
            any::lubridate
            any::Lahman
            any::babynames
            any::rvest
            any::NHANES
            any::patchwork
            any::mosaicData

      - name: Prepare README as index
        run: |
          cp README.md index.md

            - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          export RETICULATE_PYTHON="$(conda info --base)/envs/r-reticulate/bin/python"
          echo "RETICULATE_PYTHON=$RETICULATE_PYTHON"

          quarto render hw03.qmd --to html
          quarto render hw03.qmd --to ipynb
          quarto render index.md --to html

          echo "Rendered files:"
          find _site -maxdepth 2 -type f | sort

          test -f _site/hw03.html
          test -f _site/hw03.ipynb

          cp _site/hw03.ipynb hw03.ipynb

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
